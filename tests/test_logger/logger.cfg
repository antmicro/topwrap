[loggers]
keys=root

[handlers]
keys=fileHandler

[formatters]
keys=defaultFormatter

[logger_root]
level=DEBUG
handlers=fileHandler

[handler_fileHandler]
class=FileHandler
formatter=defaultFormatter
args=("./tests/test_logger/test.log","w")

[formatter_defaultFormatter]
format=%(levelname)s:%(message)s
