ips:
  soc:
    file: file:ipcores/soc.yaml
  wb_ram_data:
    file: file:ipcores/litex_mem.yaml
    parameters:
      depth: 0x1000
      memfile: '"top_sram.init"'
  wb_ram_instr:
    file: file:ipcores/litex_mem.yaml
    parameters:
      depth: 0xA000
      memfile: '"top_rom.init"'
  crg:
    file: file:ipcores/crg.yaml
  complex_subordinate:
    file: file:ipcores/complex_subordinate.yaml

name: top
connections:
  ports:
    wb_ram_data:
      sys_clk: clk100
      sys_rst: [crg, sys_rst]
    wb_ram_instr:
      sys_clk: clk100
      sys_rst: [crg, sys_rst]
    crg:
      clk100: clk100
    soc:
      sys_clk: clk100
      sys_rst: [crg, sys_rst]
      sim_serial_source_ready: sim_serial_source_ready
      sim_serial_sink_valid: sim_serial_sink_valid
      sim_serial_sink_data: sim_serial_sink_data
      sim_serial_sink_ready: sim_serial_sink_ready
      sim_serial_source_valid: sim_serial_source_valid
      sim_serial_source_data: sim_serial_source_data
interconnects:
  interconnect0:
    clock: clk100
    reset: [crg, sys_rst]
    type: Wishbone Round-Robin
    params:
      addr_width: 30
      data_width: 32
      granularity: 8
      features: ["BTE", "CTI", "ERR"]
    memory_map: map1
    managers:
      soc:
        - m_dbus_wishbone
        - m_ibus_wishbone

external:
  ports:
    in:
      - clk100
      - sim_serial_source_ready
      - sim_serial_sink_valid
      - sim_serial_sink_data
    out:
      - sim_serial_sink_ready
      - sim_serial_source_valid
      - sim_serial_source_data

memory_maps:
  map1:
    wb_ram_instr:
      address: 0x00000000
      size: 0xA000
    wb_ram_data:
      address: 0x10000000
      size: 0x1000
    soc:
      s_csr_wishbone:
        address: 0xF0000000
        size: 0x1000
    complex_subordinate:
      s_wishbone0:
        address: 0xA0000000
      s_wishbone1:
        address: 0xA1000000
        size: 0x10
