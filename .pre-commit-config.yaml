exclude: (^|/)Caliptra/

repos:
-   repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v3.2.0
    hooks:
    -   id: check-added-large-files
    -   id: check-docstring-first
    -   id: check-executables-have-shebangs
    -   id: check-json
    -   id: check-merge-conflict
    -   id: check-toml
    -   id: check-yaml
        exclude: ^(\.ci\.yml|.*\.j2\.yml)$
    -   id: end-of-file-fixer
        exclude: ^(.*\.j2)$
    -   id: mixed-line-ending
    -   id: pretty-format-json
        args: ["--autofix", "--top-keys=version,metadata"]
    -   id: requirements-txt-fixer
    -   id: trailing-whitespace

-   repo: local
    hooks:
    -   id: check-yaml-extension
        name: Check YAML extension
        entry: >-
          YAML files must use the .yaml extension, not .yml
          (only .github/ and .ci.yml are exempt)
        language: fail
        files: \.yml$
        exclude: ^(\.ci\.yml|\.github/)

    -   id: lint
        name: Lint
        pass_filenames: true
        entry: >
          bash -c '
            uv sync --extra lint
            uv run ruff format "$@"
            uv run ruff check --fix "$@"
            uv run codespell -w "$@"
          ' --
        language: system
