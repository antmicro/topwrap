ips:
  vexriscv:
    file: repo[my_repo]:VexRiscv
  wb_ram_data_additional:
    file: repo[my_repo]:mem
  wb_ram_data:
    file: repo[my_repo]:mem
    parameters:
      depth: 0x1000
  wb_ram_instr:
    file: repo[my_repo]:mem
    parameters:
      depth: 0xA000
      memfile: '"build/bios.init"'
  crg:
    file: repo[my_repo]:crg
  wb_uart:
    file: repo[my_repo]:wb_uart

name: simple_soc
connections:
  ports:
    wb_ram_data_additional:
      sys_clk: clk100
      sys_rst: [crg, sys_rst]
    wb_ram_data:
      sys_clk: clk100
      sys_rst: [crg, sys_rst]
    wb_ram_instr:
      sys_clk: clk100
      sys_rst: [crg, sys_rst]
    crg:
      clk100: clk100
    vexriscv:
      clk: clk100
      reset: [crg, sys_rst]
      softwareInterrupt: 0
      externalInterruptArray: 0
      timerInterrupt: 0
      externalResetVector: 0x00000000
    wb_uart:
      sys_clk: clk100
      sys_rst: [crg, sys_rst]
      serial1_tx: serial_tx
      serial1_rx: serial_rx

interconnects:
  wishbone_interconnect:
    clock: clk100
    reset: [crg, sys_rst]
    type: 'Wishbone Round-Robin'
    params:
      addr_width: 30
      data_width: 32
      granularity: 8
      features: ['CTI', 'BTE', 'ERR']
    memory_map: test1
    managers:
      vexriscv:
        - iBusWishbone_
        - dBusWishbone_

external:
  ports:
    in:
      - clk100
      - serial_rx
    out:
      - serial_tx

memory_maps:
  test1:
    wb_uart:
      address: 0xF0000000
    wb_ram_instr:
      address: 0x0
      size: 0xA000
    wb_ram_data:
      size: 0x1000
      address: 0x10000000
    wb_ram_data_additional:
      mem_bus:
        size: 0x1000
        address: 0x20000000
