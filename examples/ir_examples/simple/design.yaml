name: simp_top

ips:
  2mux:
    file: file:ips/2mux.yaml
    parameters:
      WIDTH: 128
  gen1:
    file: file:ips/lfsr_gen.yaml
    parameters:
      WIDTH: 128
      SEED: 1337
  gen2:
    file: file:ips/lfsr_gen.yaml
    parameters:
      WIDTH: 128

connections:
  ports:
    2mux:
      gen_sel: sel_gen
      gen1: [gen1, gen_out]
      gen2: [gen2, gen_out]
      out: rnd_bit
    gen1: &clkrst
      clk: clk
      rst: rst
    gen2: *clkrst

external:
  ports:
    in:
      - clk
      - rst
      - sel_gen
    out:
      - rnd_bit
