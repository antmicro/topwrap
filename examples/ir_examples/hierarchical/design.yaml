hierarchies:
  proc:
    hierarchies:
      4-bit counter:
        ips:
          D-flipflop:
            file: file:ips/d_ff.yaml
            parameters:
                WIDTH: 4
          adder:
            file: file:ips/adder.yaml
            parameters:
                WIDTH: 4
        connections:
          ports:
            D-flipflop:
              D:
              - adder
              - sum
              Q: sum
              clk: impulse
              rst: rst
            adder:
              a:
              - D-flipflop
              - Q
              b: impulse
        external:
          ports:
            in:
            - impulse
            - rst
            out:
            - sum
      encoder:
        external:
          ports:
            in:
            - number
            - clk
            out:
            - enc0
            - enc1
            - enc2
    ips:
      debouncer:
        file: file:ips/debouncer.yaml
        parameters:
          GRACE: 1000
    connections:
      ports:
        4-bit counter:
          impulse:
          - debouncer
          - filtered_out
          rst: rst
        debouncer:
          clk: clk
          in: btn
        encoder:
          clk: clk
          enc0: enc0
          enc1: enc1
          enc2: enc2
          number:
          - 4-bit counter
          - sum
    external:
      ports:
        in:
        - btn
        - clk
        - rst
        out:
        - enc0
        - enc1
        - enc2
connections:
  ports:
    proc:
      btn: btn
      clk: clk
      enc0: disp0
      enc1: disp1
      enc2: disp2
      rst: rst
external:
  ports:
    in:
    - clk
    - btn
    - rst
    out:
    - disp0
    - disp1
    - disp2
