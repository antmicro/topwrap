# Signals specification
# - https://developer.arm.com/documentation/ihi0051/latest (version B), page 52
id:
  library: libdefault
  name: AXI4Stream
  vendor: vendor
signals:
    # assuming transmitter = manager
    required:
        out:
            TVALID: tvalid

    optional:
        out:
            TDATA: tdata
            TSTRB: tstrb
            TKEEP: tkeep
            TLAST: tlast
            TID: tid
            TDEST: tdest
            TUSER: tuser

        in:
            TREADY: tready
